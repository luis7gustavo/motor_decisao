name: motor_decisao

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: motor_postgres
    environment:
      POSTGRES_USER: ${MOTOR_POSTGRES_USER:-motor}
      POSTGRES_PASSWORD: ${MOTOR_POSTGRES_PASSWORD:-motor}
      POSTGRES_DB: ${MOTOR_POSTGRES_DB:-motor_decisao}
    ports:
      - "${MOTOR_POSTGRES_PORT:-55432}:5432"
    volumes:
      - motor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MOTOR_POSTGRES_USER:-motor} -d ${MOTOR_POSTGRES_DB:-motor_decisao}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: motor_redis
    ports:
      - "${MOTOR_REDIS_PORT:-6380}:6379"
    volumes:
      - motor_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  selenium:
    image: selenium/standalone-chrome:4.43.0-20260404
    container_name: motor_selenium
    shm_size: "2gb"
    ports:
      - "${SELENIUM_PORT:-4444}:4444"
      - "${SELENIUM_NOVNC_PORT:-7900}:7900"
    environment:
      # 2026-05-02: keep Selenium capacity aligned with the scraper fan-out.
      SE_NODE_MAX_SESSIONS: ${SELENIUM_MAX_SESSIONS:-4}
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_SESSION_REQUEST_TIMEOUT: "60"
      SE_SESSION_RETRY_INTERVAL: "5"
      SE_SCREEN_WIDTH: "1366"
      SE_SCREEN_HEIGHT: "768"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: motor_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${MOTOR_POSTGRES_USER:-motor}:${MOTOR_POSTGRES_PASSWORD:-motor}@postgres:5432/${MOTOR_POSTGRES_DB:-motor_decisao}
      REDIS_URL: redis://redis:6379/0
      MOTOR_CONFIG_PATH: /app/config/config.yaml
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
    ports:
      - "${MOTOR_API_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      selenium:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  motor_postgres_data:
    name: motor_postgres_data
  motor_redis_data:
    name: motor_redis_data
