project:
  name: motor_decisao_compra
  environment: development

pipeline:
  site_id: MLB
  initial_category_id: MLB1051
  initial_category_name: tecnologia
  max_items_per_category: 1000
  run_mode: local

market_sources:
  market_web:
    enabled: true
    browser_engine: playwright
    headless: true
    locale: pt-BR
    timezone_id: America/Sao_Paulo
    navigation_timeout_seconds: 45
    action_timeout_seconds: 15
    scroll_steps: 4
    scroll_pause_ms: 900
    rate_limit_ms: 2500
    max_results_per_query: 30
    # 2026-05-20: ciclo padrao estabilizado para uso local e em outra maquina.
    # Fontes experimentais continuam mapeadas, mas ficam fora do ciclo principal.
    # 2026-05-21: 3 workers para rodar amazon+kabum+terabyte simultaneamente.
    # Cada fonte tem seu proprio browser Playwright — sem conflito de estado.
    parallel_workers: 3
    parallel_safe_sources:
      - amazon
      - kabum
      - terabyte
    sources:
      shopee:
        enabled: false
        base_url: https://shopee.com.br
        # 2026-05-20: recentes coletas trouxeram majoritariamente bloqueio/zero preco.
      magalu:
        enabled: false
        base_url: https://www.magazineluiza.com.br
        # 2026-05-02: temporarily out of the fast lane after repeated slow or stuck Bronze runs.
        # 2026-05-01: anti-bot recorrente; desacelera esta fonte sem afetar as demais.
        rate_limit_ms: 4500
        scroll_pause_ms: 1200
      amazon:
        enabled: true
        base_url: https://www.amazon.com.br
        # 2026-05-01: reduz pressão de navegação para mitigar bloqueios e BSR incompleto.
        rate_limit_ms: 3500
      aliexpress:
        enabled: false
        base_url: https://pt.aliexpress.com
        # 2026-05-20: fonte experimental de custo/importacao; fora do ciclo principal
        # ate validar seletores e precos em lote pequeno.
        rate_limit_ms: 5000
        scroll_pause_ms: 1500
        navigation_timeout_seconds: 60
      kabum:
        enabled: true
        base_url: https://www.kabum.com.br
      pichau:
        enabled: false
        base_url: https://www.pichau.com.br
        # 2026-05-02: desabilitada temporariamente apos travar o ciclo Bronze em running sem progresso.
        rate_limit_ms: 5000
        scroll_pause_ms: 1400
        navigation_timeout_seconds: 60
      terabyte:
        enabled: true
        base_url: https://www.terabyteshop.com.br

  mercado_livre:
    enabled: true
    api_base: https://api.mercadolibre.com
    rate_limit_ms: 250
    max_retries: 3
    timeout_seconds: 20
    catalog_product_scan_limit: 100
    # 2026-05-02: API collection can fan out wider than browser scrapers.
    parallel_workers: 4

  price_history:
    enabled: true
    preferred_source: buscape
    rate_limit_ms: 1000
    timeout_seconds: 30
    max_results: 30
    web_history:
      enabled: true
      browser_engine: playwright
      headless: true
      navigation_timeout_seconds: 45
      action_timeout_seconds: 15
      scroll_steps: 5
      scroll_pause_ms: 900
      rate_limit_ms: 1800
      # 2026-05-20: Buscape e Zoom ficam no ciclo padrao com paralelismo 1.
      parallel_workers: 1
      bronze_sources:
        - buscape
        - zoom
      max_results: 8
      product_detail_limit: 8
      max_body_chars: 50000
    candidates:
      - buscape
      - zoom

supplier_sources:
  enabled: true
  b2b_playwright:
    enabled: false
    storage_state_dir: data/playwright_states
  suppliers:
    - slug: mirao
      enabled: true
      # Loja virtual pública — preços visíveis sem login.
      # Coleta categorias de periféricos relevantes para revenda.
      urls:
        - https://www.mirao.com.br/perifericos.html
        - https://www.mirao.com.br/hardware.html
        - https://www.mirao.com.br/cabos.html
        - https://www.mirao.com.br/audio-e-video.html
      pagination:
        enabled: true
        # Padrão de URL da próxima página: adiciona ?p=N
        url_pattern: "{url}?p={page}"
        max_pages: 60
        start_page: 2
      # 2026-05-21: conservador para não acionar rate-limit
      rate_limit_ms: 2000
      selectors:
        product: ".product-item"
        title: "strong"
        # Preço à vista (segundo span = preço com desconto PIX)
        price: "span + span"
        product_url: "a@href"

entity_resolution:
  auto_approve_threshold: 0.90
  review_threshold: 0.75
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  redis_ttl_seconds: 604800

portfolio:
  budget_total: 1000.00
  max_supplier_risk_pct: 0.30
  min_distinct_products: 3
  use_conservative_estimate: true
  solver_time_limit_seconds: 60

margin:
  ml_fee_pct: 0.12
  tax_pct: 0.17
  shipping_pct: 0.03
  min_net_margin_pct: 0.20
